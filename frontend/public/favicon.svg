    <!-- Arrow shaft -->
    <line x1="0" y1="16" x2="40" y2="16" stroke="#3b82f6" stroke-width="4" stroke-linecap="round"/>
    <!-- Arrow head -->
    <polygon points="48,16 40,10 40,22" fill="#3b82f6"/>
  </g>
</svg>