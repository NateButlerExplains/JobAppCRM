<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background -->
  <rect width="64" height="64" fill="#1e293b" rx="8"/>

  <!-- Arrow pointing right in blue -->
