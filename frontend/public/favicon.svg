<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background -->
  <rect width="64" height="64" fill="#1e293b" rx="8"/>

  <!-- Gradient definition -->
  <defs>
    <linearGradient id="pipeGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Pipeline tubes -->
  <rect x="8" y="26" width="12" height="12" fill="url(#pipeGradient)" rx="2"/>
  <rect x="22" y="26" width="12" height="12" fill="url(#pipeGradient)" rx="2"/>
  <rect x="36" y="26" width="12" height="12" fill="url(#pipeGradient)" rx="2"/>
  <rect x="50" y="26" width="4" height="12" fill="url(#pipeGradient)" rx="1"/>

  <!-- Connecting lines -->
  <line x1="20" y1="32" x2="22" y2="32" stroke="url(#pipeGradient)" stroke-width="2" stroke-linecap="round"/>
  <line x1="34" y1="32" x2="36" y2="32" stroke="url(#pipeGradient)" stroke-width="2" stroke-linecap="round"/>
  <line x1="48" y1="32" x2="50" y2="32" stroke="url(#pipeGradient)" stroke-width="2" stroke-linecap="round"/>

  <!-- Arrow head pointing right -->
  <polygon points="56,32 52,28 52,36" fill="#06b6d4"/>
</svg>